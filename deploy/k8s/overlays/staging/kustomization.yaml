apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: griot-grits-staging

resources:
  - ../../base

configMapGenerator:
  - name: gng-api-config
    literals:
      - ENVIRONMENT=staging
      - SERVER_PORT=8009
      - DB_NAME=gngdb
      - STORAGE_ENDPOINT=minio.griot-grits-staging.svc.cluster.local:9000
      - STORAGE_BUCKET=artifacts
      - STORAGE_REGION=us-east-1
      - STORAGE_SECURE=false
      - ARCHIVE_PROVIDER=minio-archive
      - ARCHIVE_BUCKET=archive
      - GLOBUS_ENABLED=false
      - PIPELINE_PROVIDER=redis-queue
      - REDIS_URL=redis://gng-redis.griot-grits-staging.svc.cluster.local:6379/0
      - PIPELINE_CALLBACK_URL=http://gng-api.griot-grits-staging.svc.cluster.local:8009
      - PROCESSING_ENABLE_METADATA_EXTRACTION=true
      - PROCESSING_ENABLE_TRANSCRIPTION=true
      - PROCESSING_ENABLE_LLM_ENRICHMENT=false
      - CORS_ALLOWED_ORIGINS=https://staging.griotandgrits.org
      - AUTH_PUBLIC_BASE_URL=https://api-staging.griotandgrits.org
      - AUTH_DEFAULT_REDIRECT=https://staging.griotandgrits.org/admin
      - AUTH_COOKIE_DOMAIN=.griotandgrits.org
      - AUTH_COOKIE_SECURE=true
      - ADMIN_DEV_BYPASS=false

  - name: gng-worker-config
    literals:
      - REDIS_URL=redis://gng-redis.griot-grits-staging.svc.cluster.local:6379/0
      - PIPELINE_CALLBACK_URL=http://gng-api.griot-grits-staging.svc.cluster.local:8009
      - STORAGE_ENDPOINT=minio.griot-grits-staging.svc.cluster.local:9000
      - STORAGE_BUCKET=artifacts
      - ARCHIVE_BUCKET=archive
      - TRANSCRIPTION_API_URL=http://gng-whisper.griot-grits-staging.svc.cluster.local:9000

images:
  - name: quay.io/griot-and-grits/gng-api
    newTag: staging
  - name: quay.io/griot-and-grits/gng-worker
    newTag: staging
