apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: griot-grits-aa488b

resources:
  - ../../base
  - ingress.yaml
  - route-api.yaml

configMapGenerator:
  - name: gng-api-config
    literals:
      - ENVIRONMENT=production
      - SERVER_PORT=8009
      - DB_NAME=gngdb
      - STORAGE_ENDPOINT=minio.griot-grits-aa488b.svc.cluster.local:9000
      - STORAGE_BUCKET=artifacts
      - STORAGE_REGION=us-east-1
      - STORAGE_SECURE=false
      - ARCHIVE_PROVIDER=globus
      - ARCHIVE_BUCKET=archive
      - GLOBUS_ENABLED=true
      - GLOBUS_BASE_PATH=/archive/collections/
      - PIPELINE_PROVIDER=redis-queue
      - REDIS_URL=redis://gng-redis.griot-grits-aa488b.svc.cluster.local:6379/0
      - PIPELINE_CALLBACK_URL=http://gng-api.griot-grits-aa488b.svc.cluster.local:8009
      - PROCESSING_ENABLE_METADATA_EXTRACTION=true
      - PROCESSING_ENABLE_TRANSCRIPTION=true
      - PROCESSING_ENABLE_LLM_ENRICHMENT=false
      - CORS_ALLOWED_ORIGINS=https://www.griotandgrits.org,https://griotandgrits.org
      - AUTH_PUBLIC_BASE_URL=https://api.griotandgrits.org
      - AUTH_DEFAULT_REDIRECT=https://www.griotandgrits.org/admin
      - AUTH_COOKIE_DOMAIN=.griotandgrits.org
      - AUTH_COOKIE_SECURE=true
      - ADMIN_DEV_BYPASS=false

  - name: gng-worker-config
    literals:
      - REDIS_URL=redis://gng-redis.griot-grits-aa488b.svc.cluster.local:6379/0
      - PIPELINE_CALLBACK_URL=http://gng-api.griot-grits-aa488b.svc.cluster.local:8009
      - STORAGE_ENDPOINT=minio.griot-grits-aa488b.svc.cluster.local:9000
      - STORAGE_BUCKET=artifacts
      - ARCHIVE_BUCKET=archive
      - TRANSCRIPTION_API_URL=http://gng-whisper.griot-grits-aa488b.svc.cluster.local:9000

patches:
  # Production: 2 API replicas (already default in base)
  # Production: scale worker for throughput
  - target:
      kind: Deployment
      name: gng-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: quay.io/griot-and-grits/gng-api
    newTag: latest
  - name: quay.io/griot-and-grits/gng-worker
    newTag: latest
