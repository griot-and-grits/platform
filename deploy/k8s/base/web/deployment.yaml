apiVersion: apps/v1
kind: Deployment
metadata:
  name: gng-web
  labels:
    app.kubernetes.io/name: gng-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: gng-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gng-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gng-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: gng-platform
    spec:
      containers:
        - name: web
          image: quay.io/griot-and-grits/gng-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: gng-web-secret
                optional: true
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
