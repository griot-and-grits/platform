apiVersion: apps/v1
kind: Deployment
metadata:
  name: gng-redis
  labels:
    app.kubernetes.io/name: gng-redis
    app.kubernetes.io/component: redis
    app.kubernetes.io/part-of: gng-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gng-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gng-redis
        app.kubernetes.io/component: redis
        app.kubernetes.io/part-of: gng-platform
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
