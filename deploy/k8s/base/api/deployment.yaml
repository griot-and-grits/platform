apiVersion: apps/v1
kind: Deployment
metadata:
  name: gng-api
  labels:
    app.kubernetes.io/name: gng-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: gng-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gng-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gng-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: gng-platform
    spec:
      containers:
        - name: api
          image: quay.io/griot-and-grits/gng-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8009
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gng-api-config
            - secretRef:
                name: gng-api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
      volumes:
        - name: tmp
          emptyDir: {}
