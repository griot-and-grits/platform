apiVersion: apps/v1
kind: Deployment
metadata:
  name: gng-worker
  labels:
    app.kubernetes.io/name: gng-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: gng-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gng-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gng-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: gng-platform
    spec:
      containers:
        - name: worker
          image: quay.io/griotandgrits/gng-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: gng-worker-config
            - secretRef:
                name: gng-worker-secret
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 4Gi
              cpu: 2000m
          volumeMounts:
            - name: tmp
              mountPath: /tmp/pipeline
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Gi
