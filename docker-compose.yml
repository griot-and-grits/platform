services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8009:8009"
    environment:
      ENVIRONMENT: development
      SERVER_PORT: "8009"
      DB_URI: mongodb://mongo:27017/
      DB_NAME: gngdb
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: artifacts
      STORAGE_SECURE: "false"
      ARCHIVE_BUCKET: archive
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PIPELINE_CALLBACK_SECRET: dev-secret-change-me
      PIPELINE_CALLBACK_URL: http://api:8009
      PROCESSING_ENABLE_METADATA_EXTRACTION: "true"
      PROCESSING_ENABLE_TRANSCRIPTION: "false"
    depends_on:
      mongo:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    entrypoint: /bin/sh
    command: /scripts/minio-init.sh
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      minio:
        condition: service_started

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # --- Profile: web (Phase 2) ---
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_ADMIN_API_BASE_URL: http://localhost:8009
    volumes:
      - ./apps/web:/app
      - web-node-modules:/app/node_modules
    depends_on:
      - api
    profiles:
      - web

  # --- Profile: pipeline (Phase 3) ---
  worker:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      PIPELINE_CALLBACK_URL: http://api:8009
      PIPELINE_CALLBACK_SECRET: dev-secret-change-me
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: artifacts
      ARCHIVE_BUCKET: archive
    depends_on:
      - redis
      - api
    profiles:
      - pipeline

  # --- Profile: ai (Phase 5) ---
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ai

volumes:
  mongo-data:
  minio-data:
  redis-data:
  ollama-data:
  web-node-modules:
